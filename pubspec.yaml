name: ig_downloader
description: Download Instagram photos, videos, Reels, and Stories via the share sheet.
publish_to: 'none'
version: 1.0.1+0

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Share intent — receives URLs from Instagram share sheet (Android + iOS)
  receive_sharing_intent: ^1.8.0

  # HTTP client for fetching IG pages and downloading media
  dio: ^5.7.0

  # Save downloaded media to device gallery
  gal: ^2.3.0

  # HTML parsing — extract og:video / og:image from IG pages
  html: ^0.15.4

  # Temp & app directories
  path_provider: ^2.1.4

  # Unique IDs for each download job
  uuid: ^4.5.1

  # Permissions (storage / photos)
  permission_handler: ^11.3.1

  # Open saved files / folders from within the app
  open_filex: ^4.7.0

  # Network connectivity check (WiFi vs mobile data)
  connectivity_plus: ^6.1.4

  # Persistent user settings (WiFi-only toggle, etc.)
  shared_preferences: ^2.3.3

  # In-app WebView for Instagram login (session cookie extraction)
  webview_flutter: ^4.10.0

  # UI extras
  flutter_svg: ^2.0.10+1

  # Open the original post URL in the native IG/X/FB app (or browser)
  url_launcher: ^6.3.1

  # Foreground service so downloads keep running when the app is backgrounded
  flutter_foreground_task: ^8.17.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Generates Android (adaptive) + iOS launcher icons from assets/icon/*
  flutter_launcher_icons: ^0.14.3

# ── Launcher icon generation ──────────────────────────────────────────────────
# Source art lives in assets/icon/ and is produced by scripts/gen_icon.py.
# Run:  fvm flutter pub run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/icon/ic_full.png"
  android: true
  ios: true
  remove_alpha_ios: true
  # Android 8.0+ adaptive icon (separate background gradient + white foreground glyph)
  adaptive_icon_background: "assets/icon/ic_bg.png"
  adaptive_icon_foreground: "assets/icon/ic_fg.png"

flutter:
  uses-material-design: true
  # assets:
